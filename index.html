<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tineco Label Generator V2</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
  <main class="app-shell">

    <section class="panel no-print">
      <h1>Tineco Label Generator V2</h1>
      <p class="subtext">100 × 150 mm thermal label, landscape layout.</p>

      <div class="form-grid">
        <label>
          Model Number
          <input id="modelInput" value="FW0704BOUS" autocomplete="off" />
        </label>

        <label>
          S/N Number
          <input id="snInput" value="TCN7YXNJJ7940" autocomplete="off" />
        </label>

        <label>
          Date
          <input id="dateInput" value="JUN-2026" autocomplete="off" />
        </label>
      </div>

      <div class="button-row">
        <button id="addBtn">Add / Update Label</button>
        <button id="printCurrentBtn">Print Current</button>
        <button id="printAllBtn">Print All</button>
        <button id="clearBtn" class="danger">Clear List</button>
      </div>

      <hr />

      <h2>Batch Import</h2>
      <p class="subtext">
        Excel/CSV columns accepted: <b>MODEL</b>, <b>SN</b>, <b>DATE</b>.
        DATE is optional.
      </p>

      <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />

      <div class="button-row">
        <button id="downloadTemplateBtn">Download CSV Template</button>
      </div>

      <hr />

      <h2>Thermal Printer Calibration</h2>

      <div class="form-grid small">
        <label>
          Horizontal Offset mm
          <input id="offsetXInput" type="number" value="0" step="0.5" />
        </label>

        <label>
          Vertical Offset mm
          <input id="offsetYInput" type="number" value="0" step="0.5" />
        </label>

        <label>
          Scale %
          <input id="scaleInput" type="number" value="100" step="1" />
        </label>
      </div>

      <p class="tip">
        Print setting: paper size <b>100 × 150 mm</b>, orientation <b>landscape</b>, scale <b>100%</b>.
      </p>
    </section>

    <section class="preview-area">
      <div class="preview-header no-print">
        <h2>Live Preview</h2>
        <span id="countBadge">1 label</span>
      </div>

      <div id="printArea" class="print-area"></div>
    </section>

  </main>

  <template id="labelTemplate">
    <article class="label">
      <div class="content">

        <div class="data-row model-row">
          <div class="left-title">Model:</div>

          <div class="barcode-block">
            <div class="value-text model-text"></div>
            <svg class="barcode model-barcode"></svg>
          </div>
        </div>

        <div class="data-row sn-row">
          <div class="left-title">S/N:</div>

          <div class="barcode-block">
            <div class="value-text sn-text"></div>
            <svg class="barcode sn-barcode"></svg>
          </div>
        </div>

        <div class="bottom-row">
          <div class="date-box">
            <span class="date-title">Date:</span>
            <span class="date-text"></span>
          </div>

          <img src="tineco-logo.png.png" class="brand-logo" alt="Tineco Logo" />
        </div>

      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
